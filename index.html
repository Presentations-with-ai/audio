<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ringtones</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #111827;
    }

    button, input, a {
      font-family: inherit;
    }

    button {
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    svg {
      display: block;
      max-width: 100%;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .icon {
      width: 1.08em;
      height: 1.08em;
      flex: 0 0 auto;
      color: currentColor;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-linejoin: round;
      overflow: visible;
      pointer-events: none;
    }

    .app-shell {
      width: min(1180px, calc(100% - 22px));
      margin: 0 auto;
      padding: 18px 0 34px;
    }

    .top-panel {
      position: sticky;
      top: 12px;
      z-index: 50;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 16px;
      margin-bottom: 18px;
      animation: fade 0.35s ease;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      color: #111827;
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 6px;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
    }

    .counter-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      padding: 10px 13px;
      border-radius: 999px;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
      border: 1px solid rgba(99, 102, 241, 0.18);
      color: #4f46e5;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(99, 102, 241, 0.10);
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search {
      width: 100%;
      border: 1px solid #c7d2fe;
      border-radius: 17px;
      background: #f8fafc;
      padding: 14px 15px;
      color: #111827;
      font-size: 16px;
      font-weight: 700;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
      transition: 0.18s ease;
    }

    .search:focus {
      border-color: #6366f1;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .clear-btn {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
      color: #4338ca;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.84);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .clear-btn:hover {
      transform: translateY(-1px);
      background: linear-gradient(180deg, #f8fafc 0%, #e0e7ff 100%);
      box-shadow: 0 14px 28px rgba(79, 70, 229, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .clear-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .clear-btn:focus-visible,
    .stop-btn:focus-visible,
    .btn:focus-visible,
    .modal-btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.22), 0 12px 24px rgba(79, 70, 229, 0.18);
    }

    .now-playing {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ecfdf5 0%, #eff6ff 100%);
      border: 1px solid rgba(34, 197, 94, 0.20);
      color: #166534;
      font-size: 13px;
      font-weight: 800;
    }

    .now-playing.is-visible {
      display: flex;
    }

    .now-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stop-btn {
      flex: 0 0 auto;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff 0%, #f0fdf4 100%);
      color: #166534;
      font-weight: 900;
      padding: 8px 11px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 8px 16px rgba(22, 101, 52, 0.10), inset 0 1px 0 rgba(255, 255, 255, 0.86);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .stop-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(22, 101, 52, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .stop-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
      align-items: stretch;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      animation: fade 0.4s ease;
      color: #111827;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.22);
    }

    .cover-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: #eef2ff;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(99, 102, 241, 0.13);
    }

    .cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }

    .card:hover .cover {
      transform: scale(1.025);
    }

    .play-bubble {
      position: absolute;
      left: 10px;
      bottom: 10px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(255, 255, 255, 0.88);
      color: #4f46e5;
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transform: translateZ(0);
    }

    .play-bubble .icon {
      width: 20px;
      height: 20px;
      stroke-width: 2.15;
    }

    .title {
      margin: 11px 2px 10px;
      min-height: 42px;
      color: #111827;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 850;
      word-break: break-word;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .btn {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border: 1px solid transparent;
      border-radius: 14px;
      min-height: 45px;
      padding: 11px 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
      user-select: none;
      transform: translateZ(0);
      -webkit-font-smoothing: antialiased;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .btn .icon {
      width: 16px;
      height: 16px;
    }

    .play-btn {
      background: linear-gradient(135deg, #312e81 0%, #4f46e5 54%, #0891b2 100%);
      color: #ffffff;
      box-shadow: 0 13px 26px rgba(49, 46, 129, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .download-btn {
      background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
      color: #312e81;
      border-color: rgba(99, 102, 241, 0.28);
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.84);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .play-btn:hover {
      box-shadow: 0 17px 32px rgba(49, 46, 129, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.26);
    }

    .download-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #e0e7ff 100%);
      border-color: rgba(79, 70, 229, 0.36);
      box-shadow: 0 14px 28px rgba(79, 70, 229, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .btn:active {
      transform: translateY(0) scale(0.985);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
    }

    .btn:disabled .icon {
      animation: spin 0.9s linear infinite;
    }

    .play-btn.is-playing {
      background: linear-gradient(135deg, #15803d 0%, #0f766e 58%, #0e7490 100%);
      box-shadow: 0 13px 26px rgba(22, 163, 74, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .card.is-playing {
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.30), 0 18px 38px rgba(15, 23, 42, 0.22);
    }

    .empty {
      display: none;
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      color: #374151;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    .empty.is-visible {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 700px) {
      .app-shell {
        width: min(100% - 18px, 640px);
        padding-top: 10px;
      }

      .top-panel {
        top: 8px;
        border-radius: 21px;
        padding: 14px;
      }

      .brand-row {
        align-items: flex-start;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 13px;
      }

      .card {
        border-radius: 17px;
        padding: 9px;
      }

      .cover-wrap {
        border-radius: 14px;
      }

      .title {
        font-size: 12.5px;
        min-height: 48px;
        margin: 9px 1px 9px;
      }

      .actions {
        gap: 7px;
      }

      .btn {
        min-height: 42px;
        font-size: 12.5px;
        border-radius: 12px;
        padding: 10px 6px;
        gap: 5px;
      }

      .btn .icon {
        width: 14px;
        height: 14px;
      }

      .counter-pill {
        padding: 8px 10px;
        font-size: 12px;
      }

      .search {
        padding: 13px 14px;
        font-size: 15px;
        border-radius: 15px;
      }

      .clear-btn {
        width: 46px;
        height: 46px;
        border-radius: 15px;
      }
    }

    @media (max-width: 360px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }


    /* Compact sticky top panel */
    .top-panel {
      top: 6px;
      padding: 10px;
      border-radius: 18px;
      margin-bottom: 12px;
    }

    .brand-row {
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(22px, 3.4vw, 29px);
    }

    .subtitle {
      display: none;
    }

    .search {
      padding: 10px 12px;
      font-size: 14px;
      border-radius: 14px;
    }

    .clear-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      font-size: 20px;
    }

    .counter-pill {
      padding: 7px 10px;
      font-size: 12px;
      min-width: 70px;
    }

    .now-playing {
      margin-top: 8px;
      padding: 8px 10px;
    }

    /* Modern visual refresh, background intentionally unchanged */

    .clear-btn:focus-visible,

    .player-dock {
      position: fixed;
      left: 50%;
      bottom: 14px;
      z-index: 80;
      width: min(980px, calc(100% - 28px));
      transform: translate(-50%, 120%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.22s ease, opacity 0.22s ease;

      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;

      display: flex;
      align-items: center;
      gap: 10px;
    }

      height: 52px;
      flex: 0 0 auto;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #e0f2fe;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px 12px),
        linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(30, 41, 59, 0.90));
      background-size: 12px 12px, cover;
      background-position: center;
      border: 1px solid rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    .mini-cover.has-image {
      background-size: cover;
    }

    .mini-cover.has-image .icon {
      display: none;
    }

    .mini-cover .icon {
      width: 25px;
      height: 25px;
      stroke-width: 2;
    }

    .player-copy {
      min-width: 0;
    }

    .player-title {
      color: #ffffff;
      font-size: 14px;
      font-weight: 820;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-meta {
      margin-top: 3px;
      color: rgba(226, 232, 240, 0.58);
      font-size: 12px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-main {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .control-btn,
    .player-download {
      min-width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: rgba(15, 23, 42, 0.58);
      color: #e0f2fe;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .control-btn:hover,
    .player-download:hover {
      transform: translateY(-1px);
      background: rgba(30, 41, 59, 0.84);
      border-color: rgba(125, 211, 252, 0.34);
    }

    .control-btn:active,
    .player-download:active {
      transform: translateY(0) scale(0.98);
    }

    .control-btn:focus-visible,
    .player-download:focus-visible,
    .seek:focus-visible,
    .volume:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.22);
    }

    .control-btn.primary {
      width: 48px;
      height: 48px;
      background: #f8fafc;
      color: #0f172a;
      border-color: rgba(255, 255, 255, 0.28);
      box-shadow: 0 12px 28px rgba(2, 6, 23, 0.28);
    }

    .control-btn.primary.is-playing {
      background: #34d399;
      color: #052e16;
    }

    .control-btn .icon,
    .player-download .icon {
      width: 18px;
      height: 18px;
      stroke-width: 2.25;
    }

    .timeline {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 42px;
      gap: 8px;
      align-items: center;
    }

    .time {
      color: rgba(226, 232, 240, 0.72);
      font-size: 11px;
      font-weight: 720;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .seek,
    .volume {
      width: 100%;
      margin: 0;
      accent-color: #38bdf8;
      cursor: pointer;
    }

    .seek {
      min-width: 0;
    }

    .player-extra {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-wrap {
      width: 112px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: #bae6fd;
    }

    .volume-wrap .icon {
      width: 17px;
      height: 17px;
    }

    .player-download {
      min-width: 44px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 760px) {
      .player-dock {
        bottom: 10px;
        width: min(100% - 16px, 640px);
      }

      .player-panel {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 9px;
        border-radius: 10px;
      }

      .player-track {
        gap: 9px;
      }

      .mini-cover {
        width: 44px;
        height: 44px;
      }

      .player-controls {
        justify-content: space-between;
      }

      .control-btn {
        min-width: 38px;
        height: 38px;
      }

      .control-btn.primary {
        width: 46px;
        height: 46px;
      }

      .player-extra {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      .volume-wrap {
        width: auto;
      }

      .player-download span {
        display: none;
      }
    }


    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 9999;

      align-items: center;

    .modal-icon {

      height: 52px;

      align-items: center;
      justify-content: center;

      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(79, 70, 229, 0.25);

    .modal-icon.success {

    .modal-icon.warning {

      box-shadow: 0 14px 28px rgba(245, 158, 11, 0.25);
    }

    .modal-title {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      font-weight: 950;
    }

    .modal-message {
      margin: 0;
      color: #4b5563;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 700;
      white-space: pre-line;
    }

    .modal-input {
      display: none;
      width: 100%;
      margin-top: 14px;
      border: 1px solid #c7d2fe;
      border-radius: 16px;
      background: #f8fafc;
      padding: 13px 14px;
      color: #111827;
      font-size: 16px;
      font-weight: 800;
      outline: none;
    }

    .modal-input.is-visible {
      display: block;
    }

    .modal-input:focus {
      border-color: #6366f1;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-actions.single {
      grid-template-columns: 1fr;
    }

      border: none;
      border-radius: 16px;
      min-height: 46px;
      padding: 12px 14px;

      font-size: 15px;
      font-weight: 950;

    const grid = document.getElementById("grid");
    const counter = document.getElementById("counter");
    const search = document.getElementById("search");
    const clearSearch = document.getElementById("clearSearch");
    const player = document.getElementById("player");
    const nowPlaying = document.getElementById("nowPlaying");
    const nowTitle = document.getElementById("nowTitle");
    const stopBtn = document.getElementById("stopBtn");
    const empty = document.getElementById("empty");
    const playerDock = document.getElementById("playerDock");
    const playerCover = document.getElementById("playerCover");
    const playerTitle = document.getElementById("playerTitle");
    const playerMeta = document.getElementById("playerMeta");
    const playerPrev = document.getElementById("playerPrev");
    const playerPlayToggle = document.getElementById("playerPlayToggle");
    const playerStop = document.getElementById("playerStop");
    const playerNext = document.getElementById("playerNext");
    const playerSeek = document.getElementById("playerSeek");
    const playerCurrent = document.getElementById("playerCurrent");
    const playerDuration = document.getElementById("playerDuration");
    const playerVolume = document.getElementById("playerVolume");
    const playerDownload = document.getElementById("playerDownload");

    let currentAudio = "";
    let currentButton = null;
    let currentCard = null;
    let currentTrack = null;
    let currentIndex = -1;
    let isSeeking = false;
    let coverRequest = 0;

    const icons = {
      play: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.75v12.5L18 12 8 5.75Z"></path></svg>',
      pause: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6v12"></path><path d="M16 6v12"></path></svg>',
      download: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10"></path><path d="m7.5 9.5 4.5 4.5 4.5-4.5"></path><path d="M5 19h14"></path></svg>',
      loading: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 1 1-8.49 6"></path></svg>',
      music: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18V5l10-2v13"></path><circle cx="7" cy="18" r="2.8"></circle><circle cx="17" cy="16" r="2.8"></circle></svg>'
    };

    function setButtonContent(button, icon, label) {
      button.innerHTML = icons[icon] + '<span>' + label + '</span>';
    }

    function setIconOnly(button, icon, label) {
      button.innerHTML = icons[icon] + '<span class="sr-only">' + label + '</span>';
      button.setAttribute("aria-label", label);
      button.title = label;
    }

    function getExt(url) {
      const clean = String(url || "").split("?")[0].split("#")[0];
      const part = clean.substring(clean.lastIndexOf("/") + 1);
      const dot = part.lastIndexOf(".");
      return dot >= 0 ? part.substring(dot) : ".mp3";
    }

    function decodeFileName(path) {
      const clean = String(path || "").split("?")[0].split("#")[0];
      const part = clean.substring(clean.lastIndexOf("/") + 1);
      try {
        return decodeURIComponent(part);
      } catch (e) {
        return part || "ringtone.mp3";
      }
    }

    function safeFileName(name) {
      return String(name || "ringtone")
        .replace(/[\\/:*?"<>|]+/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 120) || "ringtone";
    }

    function getDownloadName(track) {
      const ext = getExt(track.audio);
      const fromAudio = decodeFileName(track.audio).replace(/\.[^/.]+$/, "");
      const base = track.title || fromAudio || "ringtone";
      return safeFileName(base) + ext;
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return mins + ":" + String(secs).padStart(2, "0");
    }

    function resetTimeline() {
      playerSeek.value = 0;
      playerCurrent.textContent = "0:00";
      playerDuration.textContent = "0:00";
    }

    function setPlayerCover(track) {
      const request = ++coverRequest;
      playerCover.classList.remove("has-image");
      playerCover.style.backgroundImage = "";
      playerCover.innerHTML = icons.music;

      if (!track || !track.image) return;

      const image = new Image();
      image.onload = () => {
        if (request !== coverRequest) return;
        playerCover.classList.add("has-image");
        playerCover.style.backgroundImage = 'url("' + track.image + '")';
      };
      image.onerror = () => {
        if (request !== coverRequest) return;
        playerCover.classList.remove("has-image");
        playerCover.style.backgroundImage = "";
        playerCover.innerHTML = icons.music;
      };
      image.src = track.image;
    }

    function updatePlayerTrack(track, index) {
      playerDock.classList.add("is-visible");
      playerTitle.textContent = track.title || "Без названия";
      playerMeta.textContent = (index + 1) + " из " + tracks.length + " · " + decodeFileName(track.audio);
      resetTimeline();
      setPlayerCover(track);
    }

    function resetCurrentCard() {
      if (currentButton) {
        setButtonContent(currentButton, "play", "Play");
        currentButton.classList.remove("is-playing");
      }
      if (currentCard) {
        currentCard.classList.remove("is-playing");
      }
    }

    function setPlayingState(isPlaying) {
      if (currentButton) {
        setButtonContent(currentButton, isPlaying ? "pause" : "play", isPlaying ? "Pause" : "Play");
        currentButton.classList.toggle("is-playing", isPlaying);
      }
      if (currentCard) {
        currentCard.classList.toggle("is-playing", isPlaying);
      }

      setIconOnly(playerPlayToggle, isPlaying ? "pause" : "play", isPlaying ? "Пауза" : "Играть");
      playerPlayToggle.classList.toggle("is-playing", isPlaying);

      if (currentTrack && isPlaying) {
        nowTitle.textContent = "Сейчас играет: " + currentTrack.title;
        nowPlaying.classList.add("is-visible");
      } else {
        nowPlaying.classList.remove("is-visible");
      }
    }

    function stopUi() {
      resetCurrentCard();
      currentButton = null;
      currentCard = null;
      currentAudio = "";
      currentTrack = null;
      currentIndex = -1;
      nowPlaying.classList.remove("is-visible");
      nowTitle.textContent = "Сейчас играет";
      playerDock.classList.remove("is-visible");
      playerTitle.textContent = "Выберите мелодию";
      playerMeta.textContent = "Готово к воспроизведению";
      resetTimeline();
      setPlayerCover(null);
      setPlayingState(false);
    }

    function stopAudio() {
      player.pause();
      player.removeAttribute("src");
      player.load();
      stopUi();
    }

    async function playTrack(track, index, button, card) {
      if (currentAudio === track.audio && !player.paused) {
        player.pause();
        setPlayingState(false);
        return;
      }

      if (currentAudio !== track.audio) {
        resetCurrentCard();
        currentAudio = track.audio;
        currentTrack = track;
        currentIndex = index;
        currentButton = button || null;
        currentCard = card || null;
        player.src = track.audio;
        updatePlayerTrack(track, index);
      } else {
        currentButton = button || currentButton;
        currentCard = card || currentCard;
      }

      try {
        await player.play();
        setPlayingState(true);
      } catch (e) {
        stopUi();
        alert("Не получилось включить аудио. Проверь файл:\n" + track.audio);
      }
    }

    function playTrackByIndex(index) {
      const nextIndex = (index + tracks.length) % tracks.length;
      const card = document.querySelector('[data-index="' + nextIndex + '"]');
      const button = card ? card.querySelector(".play-btn") : null;
      playTrack(tracks[nextIndex], nextIndex, button, card);
    }

    async function downloadTrack(track, btn) {
      const oldText = btn.textContent.trim() || "Скачать";
      const fileName = getDownloadName(track);

      btn.disabled = true;
      setButtonContent(btn, "loading", "Скачивается");

      try {
        const response = await fetch(track.audio);
        if (!response.ok) throw new Error("Файл не найден");

        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);

        const link = document.createElement("a");
        link.href = blobUrl;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => URL.revokeObjectURL(blobUrl), 1500);
      } catch (e) {
        const link = document.createElement("a");
        link.href = track.audio;
        link.download = fileName;
        link.rel = "noopener";
        document.body.appendChild(link);
        link.click();
        link.remove();
      } finally {
        btn.disabled = false;
        setButtonContent(btn, "download", oldText || "Скачать");
      }
    }

    function makeCard(track, index) {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.index = String(index);
      card.dataset.title = String(track.title || "").toLowerCase();

      const coverWrap = document.createElement("div");
      coverWrap.className = "cover-wrap";

      const img = document.createElement("img");
      img.className = "cover";
      img.src = track.image;
      img.alt = track.title;
      img.loading = "lazy";
      img.onerror = () => {
        img.remove();
        coverWrap.classList.add("is-missing");
        if (!coverWrap.querySelector(".cover-fallback")) {
          const fallback = document.createElement("div");
          fallback.className = "cover-fallback";
          fallback.innerHTML = icons.music;
          coverWrap.prepend(fallback);
        }
      };

      const bubble = document.createElement("div");
      bubble.className = "play-bubble";
      bubble.innerHTML = icons.music;

      coverWrap.appendChild(img);
      coverWrap.appendChild(bubble);

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = track.title;

      const actions = document.createElement("div");
      actions.className = "actions";

      const playBtn = document.createElement("button");
      playBtn.className = "btn play-btn";
      playBtn.type = "button";
      setButtonContent(playBtn, "play", "Play");

      playBtn.addEventListener("click", () => playTrack(track, index, playBtn, card));

      const download = document.createElement("button");
      download.className = "btn download-btn";
      download.type = "button";
      setButtonContent(download, "download", "Скачать");
      download.addEventListener("click", () => downloadTrack(track, download));

      actions.appendChild(playBtn);
      actions.appendChild(download);

      card.appendChild(coverWrap);
      card.appendChild(title);
      card.appendChild(actions);

      return card;
    }

    function render() {
      grid.innerHTML = "";
      tracks.forEach((track, index) => grid.appendChild(makeCard(track, index)));
      filterCards();
    }

    function filterCards() {
      const q = search.value.trim().toLowerCase();
      let visible = 0;

      document.querySelectorAll(".card").forEach(card => {
        const ok = card.dataset.title.includes(q);
        card.style.display = ok ? "block" : "none";
        if (ok) visible++;
      });

      counter.textContent = visible + " / " + tracks.length;
      empty.classList.toggle("is-visible", visible === 0);
    }

    search.addEventListener("input", filterCards);
    clearSearch.addEventListener("click", () => {
      search.value = "";
      filterCards();
      search.focus();
    });

    stopBtn.addEventListener("click", stopAudio);

    playerPlayToggle.addEventListener("click", () => {
      if (!currentTrack) {
        playTrackByIndex(0);
        return;
      }

      if (player.paused) {
        playTrack(currentTrack, currentIndex, currentButton, currentCard);
      } else {
        player.pause();
        setPlayingState(false);
      }
    });

    playerStop.addEventListener("click", stopAudio);
    playerPrev.addEventListener("click", () => playTrackByIndex(currentIndex > 0 ? currentIndex - 1 : tracks.length - 1));
    playerNext.addEventListener("click", () => playTrackByIndex(currentIndex >= 0 ? currentIndex + 1 : 0));
    playerDownload.addEventListener("click", () => {
      if (currentTrack) downloadTrack(currentTrack, playerDownload);
    });

    playerSeek.addEventListener("input", () => {
      isSeeking = true;
      playerCurrent.textContent = formatTime(Number(playerSeek.value));
    });

    playerSeek.addEventListener("change", () => {
      if (Number.isFinite(player.duration)) {
        player.currentTime = Number(playerSeek.value);
      }
      isSeeking = false;
    });

    playerVolume.addEventListener("input", () => {
      try {
        player.volume = Number(playerVolume.value);
      } catch (e) {
        playerVolume.value = "1";
      }
    });

    player.addEventListener("loadedmetadata", () => {
      const duration = Number.isFinite(player.duration) ? player.duration : 0;
      playerSeek.max = duration || 100;
      playerDuration.textContent = formatTime(duration);
    });

    player.addEventListener("timeupdate", () => {
      if (!isSeeking) {
        playerSeek.value = Number.isFinite(player.currentTime) ? player.currentTime : 0;
        playerCurrent.textContent = formatTime(player.currentTime);
      }
    });

    player.addEventListener("ended", () => {
      player.currentTime = 0;
      setPlayingState(false);
      playerSeek.value = 0;
      playerCurrent.textContent = "0:00";
    });

    player.addEventListener("pause", () => {
      if (currentButton && player.currentTime > 0 && !player.ended) {
        setPlayingState(false);
      }
    });

    setIconOnly(playerPlayToggle, "play", "Играть");
    render();
  </script>
</body>
</html>
