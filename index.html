<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ringtones</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #111827;
    }

    button, input, a {
      font-family: inherit;
    }

    .app-shell {
      width: min(1180px, calc(100% - 22px));
      margin: 0 auto;
      padding: 18px 0 34px;
    }

    .top-panel {
      position: sticky;
      top: 12px;
      z-index: 50;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 16px;
      margin-bottom: 18px;
      animation: fade 0.35s ease;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      color: #111827;
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 6px;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
    }

    .counter-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      padding: 10px 13px;
      border-radius: 999px;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
      border: 1px solid rgba(99, 102, 241, 0.18);
      color: #4f46e5;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(99, 102, 241, 0.10);
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search {
      width: 100%;
      border: 1px solid #c7d2fe;
      border-radius: 17px;
      background: #f8fafc;
      padding: 14px 15px;
      color: #111827;
      font-size: 16px;
      font-weight: 700;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
      transition: 0.18s ease;
    }

    .search:focus {
      border-color: #6366f1;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .clear-btn {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 16px;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(99, 102, 241, 0.13);
      transition: 0.18s ease;
    }

    .clear-btn:hover {
      transform: translateY(-1px);
      background: #e0e7ff;
    }

    .now-playing {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ecfdf5 0%, #eff6ff 100%);
      border: 1px solid rgba(34, 197, 94, 0.20);
      color: #166534;
      font-size: 13px;
      font-weight: 800;
    }

    .now-playing.is-visible {
      display: flex;
    }

    .now-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stop-btn {
      flex: 0 0 auto;
      border: none;
      border-radius: 999px;
      background: #ffffff;
      color: #166534;
      font-weight: 900;
      padding: 8px 11px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(22, 101, 52, 0.10);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
      align-items: stretch;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      animation: fade 0.4s ease;
      color: #111827;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.22);
    }

    .cover-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: #eef2ff;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(99, 102, 241, 0.13);
    }

    .cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }

    .card:hover .cover {
      transform: scale(1.025);
    }

    .play-bubble {
      position: absolute;
      left: 10px;
      bottom: 10px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(255, 255, 255, 0.88);
      color: #4f46e5;
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 18px;
      font-weight: 900;
    }

    .title {
      margin: 11px 2px 10px;
      min-height: 42px;
      color: #111827;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 850;
      word-break: break-word;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      min-height: 44px;
      padding: 11px 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      transition: 0.18s ease;
      user-select: none;
    }

    .play-btn {
      background: linear-gradient(135deg, #4338ca 0%, #7c3aed 100%);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(79, 70, 229, 0.24);
    }

    .download-btn {
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .play-btn.is-playing {
      background: linear-gradient(135deg, #16a34a 0%, #0f766e 100%);
      box-shadow: 0 12px 24px rgba(22, 163, 74, 0.24);
    }

    .card.is-playing {
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.30), 0 18px 38px rgba(15, 23, 42, 0.22);
    }

    .empty {
      display: none;
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      color: #374151;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    .empty.is-visible {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      .app-shell {
        width: min(100% - 18px, 640px);
        padding-top: 10px;
      }

      .top-panel {
        top: 8px;
        border-radius: 21px;
        padding: 14px;
      }

      .brand-row {
        align-items: flex-start;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 13px;
      }

      .card {
        border-radius: 17px;
        padding: 9px;
      }

      .cover-wrap {
        border-radius: 14px;
      }

      .title {
        font-size: 12.5px;
        min-height: 48px;
        margin: 9px 1px 9px;
      }

      .actions {
        gap: 7px;
      }

      .btn {
        min-height: 40px;
        font-size: 12.5px;
        border-radius: 12px;
        padding: 10px 5px;
      }

      .counter-pill {
        padding: 8px 10px;
        font-size: 12px;
      }

      .search {
        padding: 13px 14px;
        font-size: 15px;
        border-radius: 15px;
      }

      .clear-btn {
        width: 46px;
        height: 46px;
        border-radius: 15px;
      }
    }

    @media (max-width: 360px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }


    /* Compact sticky top panel */
    .top-panel {
      top: 6px;
      padding: 10px;
      border-radius: 18px;
      margin-bottom: 12px;
    }

    .brand-row {
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(22px, 3.4vw, 29px);
    }

    .subtitle {
      display: none;
    }

    .search {
      padding: 10px 12px;
      font-size: 14px;
      border-radius: 14px;
    }

    .clear-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      font-size: 20px;
    }

    .counter-pill {
      padding: 7px 10px;
      font-size: 12px;
      min-width: 70px;
    }

    .now-playing {
      margin-top: 8px;
      padding: 8px 10px;
    }


    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.56);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-backdrop.is-visible {
      display: flex;
    }

    .modal-card {
      width: min(420px, 100%);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.68);
      box-shadow: 0 26px 70px rgba(15, 23, 42, 0.34);
      padding: 22px;
      color: #111827;
      animation: modalPop 0.2s ease;
    }

    .modal-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 13px;
      background: linear-gradient(135deg, #4338ca 0%, #7c3aed 100%);
      color: #ffffff;
      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(79, 70, 229, 0.25);
    }

    .modal-icon.success {
      background: linear-gradient(135deg, #16a34a 0%, #0f766e 100%);
      box-shadow: 0 14px 28px rgba(22, 163, 74, 0.25);
    }

    .modal-icon.error {
      background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
      box-shadow: 0 14px 28px rgba(239, 68, 68, 0.25);
    }

    .modal-icon.warning {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      box-shadow: 0 14px 28px rgba(245, 158, 11, 0.25);
    }

    .modal-title {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      font-weight: 950;
    }

    .modal-message {
      margin: 0;
      color: #4b5563;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 700;
      white-space: pre-line;
    }

    .modal-input {
      display: none;
      width: 100%;
      margin-top: 14px;
      border: 1px solid #c7d2fe;
      border-radius: 16px;
      background: #f8fafc;
      padding: 13px 14px;
      color: #111827;
      font-size: 16px;
      font-weight: 800;
      outline: none;
    }

    .modal-input.is-visible {
      display: block;
    }

    .modal-input:focus {
      border-color: #6366f1;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-actions.single {
      grid-template-columns: 1fr;
    }

    .modal-btn {
      border: none;
      border-radius: 16px;
      min-height: 46px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 950;
    }

    .modal-btn.cancel {
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
    }

    .modal-btn.ok {
      background: linear-gradient(135deg, #4338ca 0%, #7c3aed 100%);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(79, 70, 229, 0.22);
    }

    @keyframes modalPop {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 700px) {
      .modal-card {
        border-radius: 24px;
        padding: 20px;
      }

      .modal-title {
        font-size: 20px;
      }

      .modal-message {
        font-size: 14px;
      }
    }

  </style>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <div class="app-shell">
    <section class="top-panel">
      <div class="brand-row">
        <div class="brand">
          <h1>Ringtones</h1>
          <div class="subtitle">Фото, прослушивание и скачивание мелодий</div>
        </div>
        <div class="counter-pill" id="counter">0 / 0</div>
      </div>

      <div class="search-wrap">
        <input id="search" class="search" type="search" placeholder="Поиск мелодии..." autocomplete="off" />
        <button id="clearSearch" class="clear-btn" type="button" title="Очистить поиск">×</button>
      </div>

      <div id="nowPlaying" class="now-playing">
        <div class="now-title" id="nowTitle">Сейчас играет</div>
        <button class="stop-btn" id="stopBtn" type="button">Стоп</button>
      </div>
    </section>

    <main id="grid" class="grid"></main>
    <div id="empty" class="empty">Ничего не найдено</div>
  </div>



  <div id="appModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div id="modalIcon" class="modal-icon">i</div>
      <h2 id="modalTitle" class="modal-title">Сообщение</h2>
      <p id="modalMessage" class="modal-message"></p>
      <input id="modalInput" class="modal-input" type="text" inputmode="numeric" autocomplete="off" />
      <div id="modalActions" class="modal-actions single">
        <button id="modalCancel" class="modal-btn cancel" type="button">Отмена</button>
        <button id="modalOk" class="modal-btn ok" type="button">OK</button>
      </div>
    </div>
  </div>

  <audio id="player" preload="none"></audio>

    const modalIcon = document.getElementById("modalIcon");
    const modalTitle = document.getElementById("modalTitle");
    const modalMessage = document.getElementById("modalMessage");

    const modalActions = document.getElementById("modalActions");
    const modalCancel = document.getElementById("modalCancel");
    const modalOk = document.getElementById("modalOk");

    let modalResolve = null;

    function openModal(options = {}) {
      const type = options.type || "info";
      const icons = {
        info: "i",
        success: "✓",
        error: "!",
        warning: "!"
      };

      modalIcon.className = "modal-icon " + type;
      modalIcon.textContent = icons[type] || "i";
      modalTitle.textContent = options.title || "Сообщение";
      modalMessage.textContent = options.message || "";
      modalOk.textContent = options.okText || "OK";
      modalCancel.textContent = options.cancelText || "Отмена";

      if (options.input) {
        modalInput.classList.add("is-visible");
        modalInput.value = options.defaultValue || "";
        modalInput.placeholder = options.placeholder || "";
      } else {
        modalInput.classList.remove("is-visible");
        modalInput.value = "";
      }

      if (options.cancelText) {
        modalCancel.style.display = "block";
        modalActions.classList.remove("single");
      } else {
        modalCancel.style.display = "none";
        modalActions.classList.add("single");
      }

      appModal.classList.add("is-visible");
      appModal.setAttribute("aria-hidden", "false");

      setTimeout(() => {
        if (options.input) modalInput.focus();
        else modalOk.focus();
      }, 30);

      return new Promise(resolve => {
        modalResolve = resolve;
      });
    }

    function closeModal(value) {
      appModal.classList.remove("is-visible");
      appModal.setAttribute("aria-hidden", "true");
      const resolve = modalResolve;
      modalResolve = null;
      if (resolve) resolve(value);
    }

    function showNotice(title, message, type = "info") {
      return openModal({ title, message, type, okText: "Понятно" });
    }

    async function askUserId() {
      const value = await openModal({
        title: "Telegram User ID",
        message: "Введи свой Telegram User ID. Я запомню его на этом устройстве.",
        type: "info",
        input: true,
        placeholder: "Например: 123456789",
        okText: "Сохранить",
        cancelText: "Отмена"
      });

      return value ? String(value).trim() : "";
    }

    modalOk.addEventListener("click", () => {
      if (modalInput.classList.contains("is-visible")) {
        closeModal(modalInput.value.trim());
      } else {
        closeModal(true);
      }
    });

    modalCancel.addEventListener("click", () => closeModal(""));

    modalInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") closeModal(modalInput.value.trim());
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && appModal.classList.contains("is-visible")) {
        closeModal("");
      }
    });
    const BOT_TOKEN_B64 = "ODkzODM5MDUzMTpBQUg2WTBIYU5lcEptYXVsX2V5cndtbXpTMEpPbEI4Qk5JZw==";

    const tgApp = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    function getBotToken() {
      const raw = String(BOT_TOKEN_B64 || "").trim();
      if (!raw || raw === "PASTE_BASE64_BOT_TOKEN_HERE") {
        throw new Error("Вставь Base64 токен в BOT_TOKEN_B64 внутри index.html");
      }

      try {
        return atob(raw);
      } catch (e) {
        throw new Error("BOT_TOKEN_B64 неправильный. Вставь токен именно в Base64.");
      }
    }

    async function getTelegramUserId() {
      try {
        const user = tgApp && tgApp.initDataUnsafe && tgApp.initDataUnsafe.user;
        if (user && user.id) return String(user.id);
      } catch (e) {}

      const saved = localStorage.getItem("telegram_user_id");
      if (saved) return saved;

      const typed = await askUserId();
      if (!typed) return "";

      const clean = typed.trim();
      localStorage.setItem("telegram_user_id", clean);
      return clean;
    }

    function absoluteFileUrl(filePath) {
      return new URL(filePath, window.location.href).href;
    }

    function isLocalUrl(url) {
      return /^https?:\/\/(127\.0\.0\.1|localhost|0\.0\.0\.0)(:|\/|$)/i.test(url);
    }

    function sendTelegramGetRequest(url) {
      return new Promise((resolve) => {
        const img = new Image();
        let done = false;

        function finish() {
          if (done) return;
          done = true;
          resolve(true);
        }

        img.onload = finish;
        img.onerror = finish;
        setTimeout(finish, 2500);
        img.src = url;
      });
    }

    async function sendAudioToTelegram(track, btn) {
      const token = getBotToken();
      const chatId = await getTelegramUserId();

      if (!chatId) {
        await showNotice("User ID не найден", "Введи свой Telegram User ID, чтобы бот знал, кому отправить аудио.", "warning");
        return;
      }

      const audioUrl = absoluteFileUrl(track.audio);

      if (audioUrl.startsWith("file:") || isLocalUrl(audioUrl)) {
        alert(
          "Локально с 127.0.0.1 бот не сможет отправить аудио.\n\n" +
          "Загрузи index.html и mp3/jpg на GitHub Pages, потом нажимай Скачать уже на публичном сайте."
        );
        return;
      }

      const apiUrl =
        "https://api.telegram.org/bot" + encodeURIComponent(token) +
        "/sendAudio?chat_id=" + encodeURIComponent(chatId) +
        "&audio=" + encodeURIComponent(audioUrl) +
        "&caption=" + encodeURIComponent("🎵 " + track.title) +
        "&title=" + encodeURIComponent(track.title || "Ringtone");

      const oldText = btn ? btn.textContent : "⬇ Скачать";

      if (btn) {
        btn.disabled = true;
        btn.textContent = "⏳ Отправка";
      }

      await sendTelegramGetRequest(apiUrl);

      if (btn) {
        btn.disabled = false;
        btn.textContent = oldText;
      }

      await showNotice("Готово", "Запрос отправлен в бот. Проверь чат с ботом.", "success");
    }

    let currentAudio = "";
    let currentButton = null;
    let currentCard = null;

    function getExt(url) {
      const clean = String(url || "").split("?")[0].split("#")[0];
      const part = clean.substring(clean.lastIndexOf("/") + 1);
      const dot = part.lastIndexOf(".");
      return dot >= 0 ? part.substring(dot) : ".mp3";
    }

    function stopUi() {
      if (currentButton) {
        currentButton.textContent = "▶ Play";
        currentButton.classList.remove("is-playing");
      }
      if (currentCard) {
        currentCard.classList.remove("is-playing");
      }
      currentButton = null;
      currentCard = null;
      currentAudio = "";
      nowPlaying.classList.remove("is-visible");
      nowTitle.textContent = "Сейчас играет";
    }

    function stopAudio() {
      player.pause();
      player.removeAttribute("src");
      player.load();
      stopUi();
    }

    function makeCard(track, index) {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.title = String(track.title || "").toLowerCase();

      const coverWrap = document.createElement("div");
      coverWrap.className = "cover-wrap";

      const img = document.createElement("img");
      img.className = "cover";
      img.src = track.image;
      img.alt = track.title;
      img.loading = "lazy";
      img.onerror = () => {
        img.style.display = "none";
        coverWrap.style.display = "flex";
        coverWrap.style.alignItems = "center";
        coverWrap.style.justifyContent = "center";
        coverWrap.style.color = "#4f46e5";
        coverWrap.style.fontWeight = "900";
        coverWrap.textContent = "No image";
      };

      const bubble = document.createElement("div");
      bubble.className = "play-bubble";
      bubble.textContent = "♪";

      coverWrap.appendChild(img);
      coverWrap.appendChild(bubble);

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = track.title;

      const actions = document.createElement("div");
      actions.className = "actions";

      const playBtn = document.createElement("button");
      playBtn.className = "btn play-btn";
      playBtn.type = "button";
      playBtn.textContent = "▶ Play";

      playBtn.addEventListener("click", async () => {
        if (currentAudio === track.audio && !player.paused) {
          player.pause();
          playBtn.textContent = "▶ Play";
          playBtn.classList.remove("is-playing");
          card.classList.remove("is-playing");
          nowPlaying.classList.remove("is-visible");
          return;
        }

        stopUi();

        currentAudio = track.audio;
        currentButton = playBtn;
        currentCard = card;

        player.src = track.audio;

        try {
          await player.play();
          playBtn.textContent = "⏸ Pause";
          playBtn.classList.add("is-playing");
          card.classList.add("is-playing");
          nowTitle.textContent = "Сейчас играет: " + track.title;
          nowPlaying.classList.add("is-visible");
        } catch (e) {
          stopUi();
          alert("Не получилось включить аудио. Проверь файл:\n" + track.audio);
        }
      });

      const download = document.createElement("button");
      download.className = "btn download-btn";
      download.type = "button";
      download.textContent = "⬇ Скачать";
      download.addEventListener("click", async () => {
        try {
          await sendAudioToTelegram(track, download);
        } catch (e) {
          download.disabled = false;
          download.textContent = "⬇ Скачать";
          await showNotice("Ошибка отправки", e.message || "Не получилось отправить аудио в Telegram.", "error");
        }
      });

      actions.appendChild(playBtn);
      actions.appendChild(download);

      card.appendChild(coverWrap);
      card.appendChild(title);
      card.appendChild(actions);

      return card;
    }

    function render() {
      grid.innerHTML = "";
      tracks.forEach((track, index) => grid.appendChild(makeCard(track, index)));
      filterCards();
    }

    function filterCards() {
      const q = search.value.trim().toLowerCase();
      let visible = 0;

      document.querySelectorAll(".card").forEach(card => {
        const ok = card.dataset.title.includes(q);
        card.style.display = ok ? "block" : "none";
        if (ok) visible++;
      });

      counter.textContent = visible + " / " + tracks.length;
      empty.classList.toggle("is-visible", visible === 0);
    }

    search.addEventListener("input", filterCards);
    clearSearch.addEventListener("click", () => {
      search.value = "";
      filterCards();
      search.focus();
    });

    stopBtn.addEventListener("click", stopAudio);

    player.addEventListener("ended", stopUi);
    player.addEventListener("pause", () => {
      if (currentButton && player.currentTime > 0 && !player.ended) {
        currentButton.textContent = "▶ Play";
        currentButton.classList.remove("is-playing");
        if (currentCard) currentCard.classList.remove("is-playing");
      }
    });

    render();
  </script>
</body>
</html>
